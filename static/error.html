<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f4f6f9; color: #1e293b;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card {
            background: #fff; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
            padding: 48px 40px; text-align: center; max-width: 420px;
        }
        h1 { font-size: 3rem; color: #4f46e5; margin-bottom: 8px; }
        p { color: #64748b; margin-bottom: 24px; }
        a {
            display: inline-block; background: #4f46e5; color: #fff; text-decoration: none;
            padding: 10px 24px; border-radius: 6px; font-weight: 600; font-size: .9rem;
        }
        a:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="card">
        <h1>404</h1>
        <p>The page you're looking for doesn't exist.</p>
        <a href="/">Go Home</a>
    </div>
</body>
</html>
